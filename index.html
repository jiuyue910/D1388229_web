<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逢甲大學圖書館 - 系統維護中</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        /* 1. 背景設定 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; 
        }
        .background-image::after {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: radial-gradient(circle, #fff 1px, transparent 1px);
        background-size: 50px 50px; /* 粒子間距 */
        opacity: 0.2;
        animation: particles 20s linear infinite;
        }

        @keyframes particles {
            from { transform: translateY(0); }
            to { transform: translateY(-50px); }
        }
        /* 將此段加在 <style> 內 */
        /* 修正後的咖啡煙霧：更靠近杯口 */
        .coffee-cup::before {
            content: '♨';
            position: absolute;
            top: -12px; /* 從原本 -20px 改為 -12px，讓它更貼近杯子 */
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem; /* 稍微縮小一點點，更有精緻感 */
            color: #fff;
            opacity: 0;
            animation: rise-steam 3s infinite;
        }

        @keyframes rise-steam {
            0% { 
                transform: translate(-50%, 0) scale(0.8); 
                opacity: 0; 
            }
            30% { 
                opacity: 0.5; /* 飛快出現 */
            }
            100% { 
                /* 將上升距離從 -30px 縮短為 -15px */
                transform: translate(-50%, -15px) scale(1.1); 
                opacity: 0; 
            }
        }
                /* 將此段加在 <style> 內 */
        .glass-panel::after {
            content: '';
            display: block;
            width: 150px;
            height: 2px;
            background: rgba(255,255,255,0.2);
            margin: 20px auto 0;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .glass-panel::after {
            /* 進度條內的跑馬燈燈效 */
            background: linear-gradient(to right, 
                transparent, 
                rgba(212, 175, 55, 0.8), 
                transparent);
            animation: progress-slide 2s linear infinite;
        }

        @keyframes progress-slide {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(150px); }
        }

        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('library.jpg'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.85); 
            z-index: -1;
        }

        /* 2. 置中毛玻璃方框 */
        .glass-panel {
            text-align: center;
            padding: 70px 40px;
            max-width: 500px;
            width: 85%;
            background: rgba(255, 255, 255, 0.08); /* 稍微調暗一點點讓書更突出 */
            border-radius: 30px;
            backdrop-filter: blur(25px); /* 增強模糊 */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.1);
            z-index: 1;
        }

        /* 3. 精緻化立體書本裝飾 (重點修改區) */
        .book-container {
            width: 130px; /* 稍微放大 */
            height: 100px;
            margin: 0 auto 40px auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 書脊 (Spine) */
        .book-spine {
            width: 18px;
            height: 100px;
            background: #1a1a1a;
            border-radius: 4px 0 0 4px;
            position: absolute;
            left: 0;
            z-index: 5;
            box-shadow: inset 2px 0 5px rgba(255,255,255,0.1), 3px 0 8px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0;
            color: #d4af37; /* 燙金顏色 */
            font-size: 12px;
            font-weight: bold;
            font-family: serif;
        }
        
        /* 書脊上的 LOGO/文字 */
        .book-spine::after {
            content: "FCUL";
            transform: rotate(90deg);
            white-space: nowrap;
            letter-spacing: 1px;
        }

        /* 書本主體與翻頁效果 */
        .book {
            width: 112px; /* 130 - 18 */
            height: 100px;
            position: absolute;
            left: 18px; /* 緊貼書脊 */
            perspective: 1500px; /* 增強立體感 */
        }

        /* 封面/封底與紙張共同樣式 */
        .page {
            width: 56px; /* (112 / 2) */
            height: 100px;
            position: absolute;
            right: 0;
            transform-origin: left center;
            border-radius: 0 5px 5px 0;
            box-shadow: inset -5px 0 15px rgba(0,0,0,0.08);
            animation: flip-enhanced 2.8s infinite ease-in-out;
            backface-visibility: hidden; /* 防止背面透視 */
            -webkit-backface-visibility: hidden;
        }

        /* 翻頁動畫 */
        @keyframes flip-enhanced {
            0% { transform: rotateY(0deg) scale(1); box-shadow: inset -5px 0 15px rgba(0,0,0,0.08); }
            15% { transform: rotateY(-30deg) scale(1.02); } /* 翻開初始 */
            80%, 100% { transform: rotateY(-180deg) scale(1); box-shadow: inset 5px 0 15px rgba(0,0,0,0.08); }
        }

        /* 固定的底色 (封底) */
        .book::before {
            content: '';
            width: 56px;
            height: 100px;
            background: #233142; /* 深藍色封底 */
            position: absolute;
            left: 0;
            border-radius: 0;
            box-shadow: inset 5px 0 15px rgba(0,0,0,0.1);
        }

        /* 調整翻頁紙張的質感 */
        .page:nth-child(1) { background: #fdf6e3; animation-delay: 0s; z-index: 3; border: 1px solid rgba(0,0,0,0.1); } /* 米色紙 */
        .page:nth-child(2) { background: #fffcf5; animation-delay: 0.35s; z-index: 2; border: 1px solid rgba(0,0,0,0.1); }
        .page:nth-child(3) { background: #ffffff; animation-delay: 0.7s; z-index: 1; border: 1px solid rgba(0,0,0,0.1); }

        /* 給紙張加入淡淡的橫線，模擬文字 */
        .page::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 10px;
            width: 36px;
            height: 60px;
            background-image: linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 100% 8px; /* 行距 */
        }

        /* 4. 文案樣式 */
        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 4px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.15rem;
            color: #ffffff;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 30px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.2);
        }

        .coffee-cup {
            font-size: 2.5rem;
            display: inline-block;
            animation: steam 2s infinite ease-in-out;
            opacity: 0.9;
        }

        @keyframes steam {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.9);
            letter-spacing: 2px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="background-image"></div>

    <div class="glass-panel">
        <div class="book-container">
            <div class="book-spine"></div> <div class="book">
                <div class="page"></div> <div class="page"></div> <div class="page"></div> </div>
        </div>

        <h1>我們正在整理書架</h1>
        <p>
            為了提供更優質的閱覽環境，<br>
            圖書館網站正進行系統維護。<br>
            請先喝杯咖啡稍作休息。
        </p>
        
        <span class="coffee-cup">☕</span>
    </div>

    <footer>
        FENG CHIA UNIVERSITY LIBRARY
    </footer>

</body>
</html>
