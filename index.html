<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逢甲大學圖書館 - 系統維護中</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500&display=swap" rel="stylesheet">
    <style>
        /* 1. 背景與全域設定 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; 
        }

        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('library.jpg'); 
            background-size: cover;
            background-position: center;
            filter: brightness(0.85); 
            z-index: -1;
        }

        .background-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle, #fff 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            animation: particles 20s linear infinite;
        }

        @keyframes particles {
            from { transform: translateY(0); }
            to { transform: translateY(-50px); }
        }

        /* 2. 置中毛玻璃方框 */
        .glass-panel {
            text-align: center;
            padding: 70px 40px;
            max-width: 500px;
            width: 85%;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.1);
            z-index: 1;
            position: relative;
        }

        /* 3. 精緻化立體書本裝飾 */
        .book-container {
            width: 130px;
            height: 100px;
            margin: 0 auto 40px auto;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .book-spine {
            width: 18px;
            height: 100px;
            background: #1a1a1a;
            border-radius: 4px 0 0 4px;
            position: absolute;
            left: 0;
            z-index: 5;
            box-shadow: inset 2px 0 5px rgba(255,255,255,0.1), 3px 0 8px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0;
            color: #d4af37;
            font-size: 12px;
            font-weight: bold;
            font-family: serif;
        }
        
        .book-spine::after {
            content: "FCUL";
            transform: rotate(90deg);
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .book {
            width: 112px;
            height: 100px;
            position: absolute;
            left: 18px;
            perspective: 1500px;
        }

        .page {
            width: 56px;
            height: 100px;
            position: absolute;
            right: 0;
            transform-origin: left center;
            border-radius: 0 5px 5px 0;
            box-shadow: inset -5px 0 15px rgba(0,0,0,0.08);
            animation: flip-enhanced 2.8s infinite ease-in-out;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        @keyframes flip-enhanced {
            0% { transform: rotateY(0deg) scale(1); box-shadow: inset -5px 0 15px rgba(0,0,0,0.08); }
            15% { transform: rotateY(-30deg) scale(1.02); }
            80%, 100% { transform: rotateY(-180deg) scale(1); box-shadow: inset 5px 0 15px rgba(0,0,0,0.08); }
        }

        .book::before {
            content: '';
            width: 56px;
            height: 100px;
            background: #233142;
            position: absolute;
            left: 0;
            border-radius: 0;
            box-shadow: inset 5px 0 15px rgba(0,0,0,0.1);
        }

        .page:nth-child(1) { background: #fdf6e3; animation-delay: 0s; z-index: 3; border: 1px solid rgba(0,0,0,0.1); }
        .page:nth-child(2) { background: #fffcf5; animation-delay: 0.35s; z-index: 2; border: 1px solid rgba(0,0,0,0.1); }
        .page:nth-child(3) { background: #ffffff; animation-delay: 0.7s; z-index: 1; border: 1px solid rgba(0,0,0,0.1); }

        .page::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 10px;
            width: 36px;
            height: 60px;
            background-image: linear-gradient(rgba(0,0,0,0.06) 1px, transparent 1px);
            background-size: 100% 8px;
        }

        /* 4. 咖啡杯與互動語錄 */
        .coffee-wrapper {
            margin-top: 20px;
            position: relative;
            display: inline-block;
        }

        .coffee-cup {
            font-size: 2.5rem;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.2s;
            user-select: none;
            animation: cup-float 2s infinite ease-in-out;
        }

        @keyframes cup-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .coffee-cup::before {
            content: '♨';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: #fff;
            opacity: 0;
            animation: rise-steam 3s infinite;
        }

        @keyframes rise-steam {
            0% { transform: translate(-50%, 0) scale(0.8); opacity: 0; }
            30% { opacity: 0.5; }
            100% { transform: translate(-50%, -15px) scale(1.1); opacity: 0; }
        }

        /* 互動對話框樣式 */
        #quote-bubble {
            position: absolute;
            top: -65px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(212, 175, 55, 0.95);
            color: #1a1a1a;
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            white-space: nowrap;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #quote-bubble.active {
            opacity: 1;
            visibility: visible;
            top: -80px;
        }

        /* 5. 文字與頁尾 */
        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 4px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.15rem;
            color: #ffffff;
            line-height: 1.8;
            margin-bottom: 10px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.2);
        }

        #timer-display {
            color: #d4af37;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        .glass-panel::after {
            content: '';
            display: block;
            width: 150px;
            height: 2px;
            background: rgba(255,255,255,0.2);
            margin: 20px auto 0;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to right, transparent, rgba(212, 175, 55, 0.8), transparent);
            animation: progress-slide 2s linear infinite;
        }

        @keyframes progress-slide {
            0% { transform: translateX(-150px); }
            100% { transform: translateX(150px); }
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.9);
            letter-spacing: 2px;
            text-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="background-image"></div>

    <div class="glass-panel">
        <div class="book-container">
            <div class="book-spine"></div> 
            <div class="book">
                <div class="page"></div> <div class="page"></div> <div class="page"></div> 
            </div>
        </div>

        <h1>我們正在整理書架</h1>
        <p>
            為了提供更優質的閱覽環境，<br>
            圖書館網站正進行系統維護。
        </p>
        
        <div id="timer-display">⏳ 計算恢復時間中...</div>

        <div class="coffee-wrapper">
            <div id="quote-bubble">點我喝咖啡！</div>
            <span class="coffee-cup" id="coffeeBtn">☕</span>
        </div>
    </div>

    <footer>
        FENG CHIA UNIVERSITY LIBRARY
    </footer>

    <script>
        // --- 1. 倒數計時邏輯 ---
        let totalSeconds = 600; 
        const timerElement = document.getElementById('timer-display');

        function startTimer() {
            const countdown = setInterval(() => {
                const mins = Math.floor(totalSeconds / 60);
                const secs = totalSeconds % 60;
                
                timerElement.innerText = `⏳ 預計恢復時間倒數：${mins} 分 ${secs < 10 ? '0' + secs : secs} 秒`;
                
                if (totalSeconds <= 0) {
                    clearInterval(countdown);
                    timerElement.innerText = "🚀 維護即將完成，請重新整理頁面！";
                }
                totalSeconds--;
            }, 1000);
        }

        // --- 2. 咖啡杯點擊互動語錄 ---
        const quotes = [
            "休息是為了走更長遠的路 ✨",
            "這杯咖啡我請客！☕",
            "圖書館正在變更美... 🛠️",
            "讀萬卷書，不如喝杯好咖啡 👍",
            "維護中，先去逛逛逢甲夜市？🍕",
            "知識正在載入中，請耐心等候 📚"
        ];

        const coffeeBtn = document.getElementById('coffeeBtn');
        const quoteBubble = document.getElementById('quote-bubble');

        coffeeBtn.addEventListener('click', () => {
            // 隨機選取一句話
            const randomIndex = Math.floor(Math.random() * quotes.length);
            quoteBubble.innerText = quotes[randomIndex];
            
            // 觸發顯示動畫
            quoteBubble.classList.add('active');
            coffeeBtn.style.transform = "scale(1.3) rotate(15deg)";
            
            // 2秒後自動收起
            setTimeout(() => {
                quoteBubble.classList.remove('active');
                coffeeBtn.style.transform = "scale(1) rotate(0deg)";
            }, 5000);
        });

        // 初始化執行
        window.onload = startTimer;
    </script>
</body>
</html>
